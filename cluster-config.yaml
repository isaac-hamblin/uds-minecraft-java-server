apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: uds
servers: 1
options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
        - server:*
ports:
  - port: 443:443
    nodeFilters:
      - loadbalancer
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 19132:19132/udp
    nodeFilters:
      - loadbalancer
