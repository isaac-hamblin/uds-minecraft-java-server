apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: uds

servers: 1
agents: 0

options:
  k3s:
    extraArgs:
      - arg: --disable=traefik
        nodeFilters:
          - server:*
      - arg: --disable=servicelb
        nodeFilters:
          - server:*

ports:
  - port: 80:80
    nodeFilters:
      - loadbalancer
  - port: 443:443
    nodeFilters:
      - loadbalancer
  - port: 25565:32565
    nodeFilters:
      - loadbalancer
