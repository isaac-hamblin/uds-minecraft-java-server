apiVersion: apps/v1
kind: Deployment
metadata:
  name: minecraft-java
  namespace: minecraft
  labels:
    app: minecraft-java
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minecraft-java
  template:
    metadata:
      labels:
        app: minecraft-java
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minecraft-data
      containers:
        - name: minecraft
          image: minecraft-java-server:latest
          env:
            - name: EULA
              value: "TRUE"
            - name: MEMORY
              value: "2G"
            - name: ONLINE_MODE
              value: "false"
          ports:
            - containerPort: 25565
              protocol: TCP
              name: mc
          volumeMounts:
            - name: data
              mountPath: /data
