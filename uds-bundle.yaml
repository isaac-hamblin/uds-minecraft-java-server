kind: UDSBundle
metadata:
  name: minecraft-bundle
  description: "A secure, air-gapped Minecraft Bedrock Server"
  version: 0.0.1
  architecture: amd64

packages:
  - name: core
    repository: ghcr.io/defenseunicorns/packages/uds/core
    ref: 0.61.1-registry1
    overrides:
      istio-tenant-gateway:
        gateway:
          values:
            - path: service.ports
              value:
                - name: minecraft
                  port: 19132
                  targetPort: 19132
                  protocol: UDP

  - name: minecraft-bedrock
    path: zarf-package-minecraft-bedrock-amd64.tar.zst
    ref: 0.0.1
