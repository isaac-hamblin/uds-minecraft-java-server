kind: ZarfPackageConfig
metadata:
  name: minecraft-java
  description: "Minecraft Java Edition Server for UDS"

components:
  - name: server
    required: true
    manifests:
      - name: minecraft-manifests
        namespace: minecraft
        files:
          - manifests/deployment.yaml
          - manifests/service.yaml
          - manifests/istio-gateway-minecraft.yaml
          - manifests/istio-virtualservice-minecraft.yaml
          - manifests/uds-package-minecraft.yaml
          - manifests/pvc.yaml
    images:
      - "minecraft-java-server:latest"
